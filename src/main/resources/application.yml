server:
  port: 8080

spring:
  application:
    name: ai-knowledge-base
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# CORS配置
cors:
  allowed-origins: "*"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 向量存储配置
vectorstore:
  pgvector:
    table-name: embeddings

# 文档配置
document:
  chunk-size: 500
  chunk-overlap: 50
