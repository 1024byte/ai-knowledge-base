server:
  port: 8080

spring:
  application:
    name: ai-knowledge-base
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mybatis-plus:
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境显示 SQL
      map-underscore-to-camel-case: true
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: status
        logic-delete-value: deleted
        logic-not-delete-value: active

# CORS配置
cors:
  allowed-origins: "*"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 向量存储配置
vectorstore:
  pgvector:
    table-name: embeddings

# 文档配置
document:
  chunk:
    min-tokens: 400
    max-tokens: 800
    overlap-ratio: 0.2
    semantic-threshold: 0.6 # 推荐 0.7-0.8，需要根据数据调优

langchain4j:
  tokenizer:
    model-name: gpt-4o-mini   # 或者 gpt-4o, gpt-3.5-turbo 等

# 查询改写配置
query-rewrite:
  enabled: true                      # 总开关
  config:
    synonyms-path: query-rewrite/synonyms.json
    fixed-mapping-path: query-rewrite/fixed-mapping.json
    stopwords-path: query-rewrite/stopwords.json
  l1:
    confidence-threshold: 0.85       # L1 置信度高于此值直接返回
  l2:
    confidence-threshold: 0.70       # L2 置信度高于此值直接返回

# 混合检索配置（并行双路召回 + RRF 融合）
hybrid-search:
  enabled: true                      # 总开关：true=向量+关键词双路召回，false=仅向量检索
  rrf:
    k: 60                            # RRF 常数 k，值越大排名差异越平滑（推荐 60）
